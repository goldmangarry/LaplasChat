<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0a0a0f"/>

  <!-- Gradient glow -->
  <ellipse cx="640" cy="280" rx="500" ry="300" fill="url(#glow)" opacity="0.4"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#6c56f0" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Logo circle -->
  <circle cx="640" cy="200" r="52" fill="#6c56f0"/>
  <!-- Logo chevrons -->
  <path d="M629 178L649 200L629 222" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M620 188L630 200L620 212" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Title -->
  <text x="640" y="310" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="700" font-size="64" fill="white" letter-spacing="-1">
    LaplasChat
  </text>

  <!-- Subtitle -->
  <text x="640" y="365" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="400" font-size="24" fill="#9ca3af">
    Open Source AI Chat with Privacy Protection
  </text>

  <!-- Feature pills -->
  <rect x="280" y="420" width="130" height="36" rx="18" fill="#6c56f0" fill-opacity="0.15" stroke="#6c56f0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="345" y="443" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#a78bfa" font-weight="500">20+ Models</text>

  <rect x="430" y="420" width="130" height="36" rx="18" fill="#6c56f0" fill-opacity="0.15" stroke="#6c56f0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="495" y="443" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#a78bfa" font-weight="500">Secure Mode</text>

  <rect x="580" y="420" width="120" height="36" rx="18" fill="#6c56f0" fill-opacity="0.15" stroke="#6c56f0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="640" y="443" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#a78bfa" font-weight="500">No Backend</text>

  <rect x="720" y="420" width="130" height="36" rx="18" fill="#6c56f0" fill-opacity="0.15" stroke="#6c56f0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="785" y="443" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#a78bfa" font-weight="500">Desktop App</text>

  <rect x="870" y="420" width="130" height="36" rx="18" fill="#6c56f0" fill-opacity="0.15" stroke="#6c56f0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="935" y="443" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#a78bfa" font-weight="500">MIT License</text>

  <!-- Bottom URL -->
  <text x="640" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#4b5563" font-weight="400">
    github.com/goldmangarry/LaplasChat
  </text>

  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#6c56f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
