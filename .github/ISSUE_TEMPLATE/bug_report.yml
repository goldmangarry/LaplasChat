name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows (Desktop App)
        - macOS (Desktop App)
        - Web (Browser)
        - Docker
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit hash
      placeholder: v1.0.0
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, logs, or any other context.
